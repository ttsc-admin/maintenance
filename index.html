<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งซ่อม</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
            background-color: #f4f6f9; 
        }
        .iframe-container {
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%; 
            margin-top: 0; 
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe id="gasIframe" src=""></iframe>
    </div>

    <script>
        function setFavicon(iconUrl) {
            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
                link = document.createElement('link');
                link.rel = 'icon';
                document.head.appendChild(link);
            }
            link.href = iconUrl;
        }

        // 💡 1. ดึง parameter ทั้งหมดจาก URL ของ GitHub (เช่น ?page=admin&token=...)
        const urlParams = window.location.search; 
        const paramsObj = new URLSearchParams(urlParams);
        const pageParam = paramsObj.get('page');

        // 2. URL ต้นทางของ Google Apps Script
        const baseUrl = "https://script.google.com/macros/s/AKfycbz1bkkNLlkO3B7TrgyEvE_gYad9jg2cP1LojubSJvMiRAWIUR0dba8pZx3O7YMKaN-8jw/exec";

        // 3. ตรวจสอบเงื่อนไข เพื่อเปลี่ยนชื่อแท็บ + รูปไอคอน
        if (pageParam === 'admin') {
            document.title = "ระบบบริหารจัดการงานซ่อม (Dashboard)";
            setFavicon("https://img.icons8.com/fluency/96/combo-chart.png");
            
        } else if (pageParam === 'tech') {
            document.title = "Technician Portal (สำหรับช่าง)";
            setFavicon("https://img.icons8.com/fluency/96/maintenance.png");
            
        } else {
            document.title = "ระบบแจ้งซ่อมบำรุง (Maintenance System)";
            setFavicon("https://img.icons8.com/fluency/96/toolbox.png");
        }

        // 💡 4. สั่งให้ iframe โหลด URL ต้นทาง + พ่วง Parameter ทุกตัวทะลุเข้าไปด้วย!
        document.getElementById('gasIframe').src = baseUrl + urlParams;
    </script>
</body>
</html>
